<!DOCTYPE html>
<html>
<head>
  <title>Fund Tracker</title>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg,#1d4350,#a43931);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .box {
      width: 90%;
      max-width: 900px;
      background: rgba(255,255,255,0.1);
      padding: 20px;
      border-radius: 15px;
    }

    h1 { text-align: center; }

    input, select {
      padding: 10px;
      margin: 5px;
      border-radius: 5px;
      border: none;
    }

    button {
      padding: 10px;
      background: #00c6ff;
      border: none;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }

    table {
      width: 100%;
      margin-top: 20px;
      background: white;
      color: black;
      border-collapse: collapse;
    }

    th, td {
      padding: 10px;
      border: 1px solid #ddd;
      text-align: center;
    }

    th {
      background: #333;
      color: white;
    }

    .delete { background: red; }
    .edit { background: orange; }

    .balance {
      margin-top: 15px;
      font-size: 22px;
      text-align: right;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="box">
  <h1>💰 Fund Tracker</h1>

  <input type="date" id="date">
  <input type="text" id="desc" placeholder="Description">

  <select id="type">
    <option value="revenue">Revenue</option>
    <option value="cost">Cost</option>
  </select>

  <input type="number" id="amount" placeholder="Amount">
  <button onclick="addData()">Add</button>

  <table>
    <thead>
      <tr>
        <th>Date</th>
        <th>Description</th>
        <th>Revenue</th>
        <th>Cost</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>

  <div class="balance">
    Balance: <span id="balance">0</span>
  </div>
</div>

<script>
/* 🔥 YOUR FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyCOwwGWeNVglAKbrPInK2D1fzVtEhS77mA",
  authDomain: "fund-tracker-d5f11.firebaseapp.com",
  databaseURL: "https://fund-tracker-d5f11-default-rtdb.firebaseio.com",
  projectId: "fund-tracker-d5f11",
  storageBucket: "fund-tracker-d5f11.firebasestorage.app",
  messagingSenderId: "227241173054",
  appId: "1:227241173054:web:d6eecb1a9994b20672316f"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database().ref("transactions");

let editId = null;

/* ADD OR UPDATE */
function addData() {
  let date = document.getElementById("date").value;
  let desc = document.getElementById("desc").value;
  let type = document.getElementById("type").value;
  let amount = Number(document.getElementById("amount").value);

  if (!date || !desc || !amount) {
    alert("Fill all fields");
    return;
  }

  if (editId) {
    db.child(editId).set({ date, desc, type, amount });
    editId = null;
  } else {
    db.push({ date, desc, type, amount });
  }

  document.getElementById("desc").value = "";
  document.getElementById("amount").value = "";
}

/* DELETE */
function deleteItem(id) {
  db.child(id).remove();
}

/* EDIT */
function editItem(id, item) {
  document.getElementById("date").value = item.date;
  document.getElementById("desc").value = item.desc;
  document.getElementById("type").value = item.type;
  document.getElementById("amount").value = item.amount;

  editId = id;
}

/* LIVE DATA */
db.on("value", (snapshot) => {
  let data = snapshot.val();
  let table = document.getElementById("tableBody");
  table.innerHTML = "";

  let balance = 0;

  for (let id in data) {
    let item = data[id];

    let revenue = "";
    let cost = "";

    if (item.type === "revenue") {
      revenue = item.amount;
      balance += item.amount;
    } else {
      cost = item.amount;
      balance -= item.amount;
    }

    table.innerHTML += `
      <tr>
        <td>${item.date}</td>
        <td>${item.desc}</td>
        <td>${revenue}</td>
        <td>${cost}</td>
        <td>
          <button class="edit" onclick='editItem("${id}", ${JSON.stringify(item)})'>Edit</button>
          <button class="delete" onclick='deleteItem("${id}")'>Delete</button>
        </td>
      </tr>
    `;
  }

  document.getElementById("balance").innerText = balance;
});
</script>

</body>
</html>
