<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>University Project | Fund Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-4 md:p-8">

    <div class="max-w-5xl mx-auto">
        <div class="flex flex-col md:flex-row md:items-center justify-between mb-10 gap-4">
            <div>
                <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">Fund Tracker Dashboard</h1>
                <p class="text-slate-500 font-medium">Project Financial Summary & Audit Trail</p>
            </div>
            <div class="flex items-center bg-white px-4 py-2 rounded-full shadow-sm border border-slate-200">
                <span class="relative flex h-3 w-3 mr-3">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-3 w-3 bg-emerald-500"></span>
                </span>
                <span class="text-sm font-semibold text-slate-600 uppercase tracking-wider" id="syncStatus">Live Sync Enabled</span>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <p class="text-xs font-bold text-slate-400 uppercase mb-2">Net Balance</p>
                <div class="flex items-baseline gap-2">
                    <span id="totalBalance" class="text-4xl font-bold text-slate-900">$0.00</span>
                </div>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 border-t-4 border-t-emerald-500">
                <p class="text-xs font-bold text-emerald-600 uppercase mb-2">Total Revenue</p>
                <div class="flex items-baseline gap-2">
                    <span id="totalRevenue" class="text-4xl font-bold text-emerald-600">$0.00</span>
                </div>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 border-t-4 border-t-rose-500">
                <p class="text-xs font-bold text-rose-600 uppercase mb-2">Total Costs</p>
                <div class="flex items-baseline gap-2">
                    <span id="totalCost" class="text-4xl font-bold text-rose-600">$0.00</span>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="px-6 py-4 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
                <h3 class="font-bold text-slate-800">Transaction History</h3>
                <button onclick="fetchData()" class="text-xs font-bold text-indigo-600 hover:text-indigo-800 transition uppercase tracking-widest">
                    Refresh Data
                </button>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead>
                        <tr class="text-slate-400 text-xs uppercase font-bold tracking-widest">
                            <th class="px-6 py-4">Description</th>
                            <th class="px-6 py-4">Type</th>
                            <th class="px-6 py-4 text-right">Amount</th>
                        </tr>
                    </thead>
                    <tbody id="transactionList" class="divide-y divide-slate-100 text-slate-700">
                        <tr>
                            <td colspan="3" class="px-6 py-10 text-center text-slate-400 italic">Connecting to project database...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
        
        <p class="text-center text-slate-400 text-xs mt-8 font-medium italic">
            Automated Fund Reporting System &copy; 2026
        </p>
    </div>

    <script>
        // Your Specific CSV Link
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQXLZ_1VvkSTy7tyquOVn4EkzpT57lwza7_OEZFHrCPmLSaVcBxzu8Qr-po8CYO07tlCzGS0-diCC5Y/pub?output=csv';

        async function fetchData() {
            const statusEl = document.getElementById('syncStatus');
            try {
                const response = await fetch(csvUrl);
                if (!response.ok) throw new Error('Data fetch failed');
                
                const csvData = await response.text();
                const rows = csvData.split('\n').slice(1); // Skip header row

                const transactions = rows.map(row => {
                    const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (cols.length < 3) return null;
                    return {
                        desc: cols[0].replace(/"/g, '').trim(),
                        amount: parseFloat(cols[1]),
                        type: cols[2].trim().toLowerCase()
                    };
                }).filter(t => t !== null && !isNaN(t.amount));

                renderDashboard(transactions);
                statusEl.innerText = "Live Sync Active";
                statusEl.parentElement.classList.replace('border-rose-200', 'border-slate-200');
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('transactionList').innerHTML = `
                    <tr><td colspan="3" class="px-6 py-10 text-center text-rose-500 font-bold">Error: Link Not Accessible. Please check sharing settings.</td></tr>
                `;
                statusEl.innerText = "Sync Failed";
                statusEl.parentElement.classList.add('border-rose-200');
            }
        }

        function renderDashboard(data) {
            const list = document.getElementById('transactionList');
            list.innerHTML = '';
            let totalRev = 0;
            let totalCost = 0;

            data.forEach(item => {
                const isRevenue = item.type === 'revenue';
                if (isRevenue) totalRev += item.amount;
                else totalCost += item.amount;

                const row = `
                    <tr class="hover:bg-slate-50 transition-colors">
                        <td class="px-6 py-4 font-semibold text-slate-800">${item.desc}</td>
                        <td class="px-6 py-4">
                            <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-bold tracking-wide ${isRevenue ? 'bg-emerald-100 text-emerald-700' : 'bg-rose-100 text-rose-700'}">
                                ${item.type.toUpperCase()}
                            </span>
                        </td>
                        <td class="px-6 py-4 text-right font-mono font-bold ${isRevenue ? 'text-emerald-600' : 'text-rose-600'}">
                            ${isRevenue ? '+' : '-'}${item.amount.toFixed(2)}
                        </td>
                    </tr>
                `;
                list.insertAdjacentHTML('beforeend', row);
            });

            document.getElementById('totalRevenue').innerText = `$${totalRev.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
            document.getElementById('totalCost').innerText = `$${totalCost.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
            document.getElementById('totalBalance').innerText = `$${(totalRev - totalCost).toLocaleString(undefined, {minimumFractionDigits: 2})}`;
        }

        // Run on load
        fetchData();
        
        // Auto-refresh every 60 seconds for live presentation
        setInterval(fetchData, 60000);
    </script>
</body>
</html>
